server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: legal-review-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/legalreview}
    username: ${DB_USERNAME:legalreview}
    password: ${DB_PASSWORD:legalreview}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.legalreview.service.LawApiClient: ${LAW_API_LOG_LEVEL:INFO}
    com.legalreview.service.LawSearchService: ${LAW_API_LOG_LEVEL:INFO}

app:
  ai:
    base-url: ${AI_SERVER_URL:http://localhost:8001}
  law-api:
    base-url: https://www.law.go.kr/DRF/lawSearch.do
    oc: ${LAW_API_OC:}
