server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: legal-review-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/legalreview}
    username: ${DB_USERNAME:legalreview}
    password: ${DB_PASSWORD:legalreview}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.legalreview.service.LawApiClient: ${LAW_API_LOG_LEVEL:INFO}
    com.legalreview.service.LawSearchService: ${LAW_API_LOG_LEVEL:INFO}

app:
  ai:
    # engine: python → 기존 Python FastAPI 호출, ollama → 로컬 Ollama 직접 호출
    engine: ${AI_ENGINE:python}
    base-url: ${AI_SERVER_URL:http://localhost:8001}
    # Python AI Server 호출 timeout (LangGraph + RunPod/Ollama 호출이 길어질 수 있어 넉넉히)
    connect-timeout-seconds: ${AI_CONNECT_TIMEOUT_SECONDS:30}
    read-timeout-seconds: ${AI_READ_TIMEOUT_SECONDS:900}   # 기본 15분 — 필요 시 환경변수로 조정
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:glm-4.7-flash:q4_K_M}
      timeout-seconds: ${OLLAMA_TIMEOUT:300}
  law-api:
    base-url: https://www.law.go.kr/DRF/lawSearch.do
    oc: ${LAW_API_OC:}
    # ── RAG 수집(LawApiProperties) 신규 키 ──
    search-url: ${LAW_API_SEARCH_URL:http://www.law.go.kr/DRF/lawSearch.do}
    service-url: ${LAW_API_SERVICE_URL:http://www.law.go.kr/DRF/lawService.do}
    default-display: ${LAW_API_DEFAULT_DISPLAY:100}
    request-delay-ms: ${LAW_API_REQUEST_DELAY_MS:150}
    max-pages: ${LAW_API_MAX_PAGES:1}

  # 법령/판례 RAG (Chroma) 설정
  # 기본은 비활성. APP_RAG_ENABLED=true 환경변수로만 켠다.
  rag:
    enabled: ${APP_RAG_ENABLED:false}
    chroma:
      base-url: ${CHROMA_BASE_URL:http://localhost:8000}
      laws-collection: ${CHROMA_LAWS_COLLECTION:laws}
      cases-collection: ${CHROMA_CASES_COLLECTION:cases}
      timeout-seconds: ${CHROMA_TIMEOUT_SECONDS:15}
    top-k:
      law: ${RAG_TOPK_LAW:3}
      caze: ${RAG_TOPK_CASE:2}     # "case"는 Java 예약어 → 설정 키도 caze로 통일
    embedding:
      # provider: simple(default) | external | e5(stub)
      provider: ${APP_RAG_EMBEDDING_PROVIDER:simple}
      model: ${RAG_EMBEDDING_MODEL:simple-hash-v1}
      dimension: ${RAG_EMBEDDING_DIM:384}
      external:
        base-url: ${RAG_EMBEDDING_EXTERNAL_URL:http://localhost:9100}
        embed-path: ${RAG_EMBEDDING_EXTERNAL_PATH:/embed}
        timeout-seconds: ${RAG_EMBEDDING_EXTERNAL_TIMEOUT:30}
    # 실험 추적 — RAG enabled와 독립적으로 ON 가능 (baseline 측정용)
    experiment:
      enabled: ${RAG_EXPERIMENT_ENABLED:false}
      tag: ${RAG_EXPERIMENT_TAG:default}
