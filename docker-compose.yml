services:
  postgres:
    image: postgres:16-alpine
    container_name: legalreview-postgres
    environment:
      POSTGRES_USER: legalreview
      POSTGRES_PASSWORD: legalreview
      POSTGRES_DB: legalreview
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalreview -d legalreview"]
      interval: 3s
      timeout: 5s
      retries: 15
