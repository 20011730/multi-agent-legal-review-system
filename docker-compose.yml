# 로컬 개발용 docker-compose
# - PostgreSQL: 운영 데이터(세션/판정/근거/법령 메타·본문)
# - Chroma:    법령/판례 chunk 임베딩 인덱스
#
# 실행:
#   docker compose up -d            # 둘 다 백그라운드 실행
#   docker compose stop             # 중지(데이터 유지)
#   docker compose down -v          # 데이터 볼륨까지 삭제 (주의)
#
# 헬퍼 스크립트:
#   ./scripts/start-db.sh / stop-db.sh / reset-db.sh

services:
  postgres:
    image: postgres:16-alpine
    container_name: legalreview-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalreview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalreview}
      POSTGRES_DB: ${POSTGRES_DB:-legalreview}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalreview} -d ${POSTGRES_DB:-legalreview}"]
      interval: 3s
      timeout: 5s
      retries: 15

  chroma:
    # 0.5.x 안정 라인 — 0.6+ 와는 API 일부 변경. 본 프로젝트는 v1 REST 호환 가정.
    image: chromadb/chroma:0.5.23
    container_name: legalreview-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      # v2 heartbeat — Chroma 0.5.x 기본. wget이 chromadb 컨테이너에서 누락된 경우가 있어
      # python으로 한 번 더 fallback 시도. 둘 다 실패하면 unhealthy.
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8000/api/v2/heartbeat 2>/dev/null \
              || python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat').read()\" \
              || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  postgres_data:
    name: legalreview_postgres_data
  chroma_data:
    name: legalreview_chroma_data
